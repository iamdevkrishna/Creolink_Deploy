name: CI/CD Pipeline to Render

on:
  push:
    branches:
      - main

jobs:
  test_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Tests
        run: |
          cd backend
          python manage.py test

  test_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Frontend Safety Check
        run: |
          cd frontend
          npm run build

  build-push-deploy:
    needs: [test_backend, test_frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/creolink-test-backend:latest

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/creolink-test-frontend:latest

      - name: Trigger Backend Deploy on Render
        if: env.RENDER_HOOK != ''
        env:
          RENDER_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: curl -s -X POST $RENDER_HOOK
        
      - name: Trigger Frontend Deploy on Render
        if: env.RENDER_HOOK != ''
        env:
          RENDER_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: curl -s -X POST $RENDER_HOOK
